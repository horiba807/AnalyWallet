<html>

<head>
    <meta charset="utf-8">
    <title>ログイン - AnalyWallet</title>
    <link rel="stylesheet" href="../style/destyle.css">
    <link rel="stylesheet" href="../style/auth.css"> 
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Albert+Sans:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans+JP:wght@100..900&display=swap"
        rel="stylesheet"
    />
    <link
        href="https://fonts.googleapis.com/icon?family=Material+Icons"
        rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, viewport-fit=cover">
    <link rel="icon" href="../img/favicon.ico">
    <link rel="manifest" href="../manifest.json" crossorigin="use-credentials">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="AnalyWallet">
    <link rel="apple-touch-icon" href="../img/icon-192.png">
</head>

<body>
    <header>
        <div class=header_wrapper>
            <div class="hedaer_logo">
                <span class="logo_img">
                    <img src="../img/logo.png">
                </span>
                <h1>AnalyWallet</h1>
            </div>
        </div>
    </header>
    <main>
        <div class="auth_box">
            <h2 class="title">ログイン</h2>
            <form id="auth-form">
                <input type="email" id="auth-email" placeholder="メールアドレス" required>
                <input type="password" id="auth-password" placeholder="パスワード" required>
                <button type="submit" id="auth-submit-btn">ログインする</button>
            </form>
            <div class="resetPass_btn_wrapper">
                <a class="resetPass_btn" id="openResetPassModal" >パスワードをお忘れの場合</a>
            </div>
        </div>
        
        <div class="register_btn_wrapper">
            <a class="register_btn" id="displayModalBtn">新規登録はこちら</a>
        </div>
    </main>
    <footer>
        <div class="auth-link_wrapper">
            <div class="auth-link">
                <a href="about/index.html">AnalyWalletについて</a>
            </div>
            <div class="auth-link">
                <a href="about/index.html">利用規約</a>
            </div>
            <div class="auth-link">
                <a href="about/index.html">プライバシーポリシー</a>
            </div>
        </div>
        <p id="app-version"></p>
        <p class="copyright">© 2026 AnalyWallet.</p>
    </footer>
    <script type="module" src="../script/login.js"></script>



    <div class="modal-wrapper" id="signup-modal_wrapper">
        <div id="signup-modal" class="modal">
            <div class="close_btn_wrapper">
                <button class="close_btn" id="close_modal_btn"><span class="material-icons">close</span></button>
            </div>
            <div class="logo_wrapper">
                <div>
                    <span class="logo_img">
                        <img src="../img/logo.png">
                    </span>
                    <h1>AnalyWallet</h1>
                </div>
            </div>

            <div class="modal-content">
                <h2>新規アカウント作成</h2>
                <p>ご利用にはアカウント作成が必要です。<br>以下のフォームからご登録ください。</p>
        
                <form id="signup-form">
                    <div class="input_wrapper">
                        <input type="email" id="signup-email" placeholder="メールアドレス" required>
                    </div>
                    <div class="input_wrapper">
                        <input type="password" id="signup-password" placeholder="パスワード（12文字以上）" required>
                    </div>
                    <div class="input_wrapper">
                        <input type="checkbox" id="signup-terms" required>
                        <label for="signup-terms">
                            <a href="#">利用規約</a>・<a href="#">プライバシーポリシー</a>に同意する
                        </label>
                    </div>
                    <button type="submit" id="signup-submit-btn">登録する</button>
                </form>
            </div>
        </div>
    </div>
    <div class="modal-wrapper" id="loginMFA-modal_wrapper">
        <div id="loginMFA-modal" class="modal">
            <div class="modal-content" style="text-align: center;">
                <h2>二段階認証コードの入力</h2>
                <p>認証アプリに表示されている6桁のコードを入力してください。</p>
                <input type="text" id="login-mfa-code" placeholder="123456" maxlength="6">
                <button id="btn-login-mfa-verify">認証する</button>
            </div>
        </div>
    </div>


    <div class="modal-wrapper" id="forgetPass-modal_wrapper">
        <div id="forgetPass-modal" class="modal">
            <div class="close_btn_wrapper">
                <button class="close_btn" id="close_FogetPassModal_btn"><span class="material-icons">close</span></button>
            </div>
            <div class="logo_wrapper">
                <div>
                    <span class="logo_img">
                        <img src="../img/logo.png">
                    </span>
                    <h1>AnalyWallet</h1>
                </div>
            </div>

            <div class="modal-content">
                <h2>パスワード再設定</h2>
                <p>登録した際のメールアドレスを入力してください。<br>パスワード再設定用のリンクを送信します。</p>
        
                <form id="forgotPass-form">
                    <div class="input_wrapper">
                        <input type="email" id="forgotPass-email" placeholder="メールアドレス" required>
                    </div>
                    <a id="link-forgot-password" href="#">登録する</a>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
