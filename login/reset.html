<html>

<head>
    <meta charset="utf-8">
    <title>パスワード再設定 - AnalyWallet</title>
    <link rel="stylesheet" href="../style/destyle.css">
    <link rel="stylesheet" href="../style/auth.css">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Albert+Sans:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans+JP:wght@100..900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, viewport-fit=cover">
    <link rel="icon" href="../img/favicon.ico">
    <link rel="manifest" href="../manifest.json" crossorigin="use-credentials">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="AnalyWallet">
    <link rel="apple-touch-icon" href="../img/icon-192.png">
</head>
<body>
    <header>
        <div class=header_wrapper>
            <div class="hedaer_logo">
                <span class="logo_img">
                    <img src="../img/logo.png">
                </span>
                <h1>AnalyWallet</h1>
            </div>
        </div>
    </header>
    <main>
        <div class="resetPass_modal">
            <h2>新しいパスワードの設定</h2>
            <p>新しいパスワード（12文字以上）を入力してください。</p>
            
            <form id="form-reset-password">
                <input type="password" id="input-reset-new-password" placeholder="新しいパスワード" required >
                
                <button type="submit">
                    パスワードを更新してログイン
                </button>
            </form>
        </div>
    </main>
    <script type="module" src="../script/reset.js"></script>
</body>
</html>
